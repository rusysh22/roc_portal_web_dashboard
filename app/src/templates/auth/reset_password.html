{% extends "base.html" %}
{% block title %}Reset Kata Sandi — {{ app_name }}{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 px-6 py-12"
     x-data="{ loading: false, done: false, error: '' }">
  <div class="w-full max-w-md">
    <div class="card">
      <h2 class="text-xl font-bold mb-1">Buat Kata Sandi Baru</h2>
      <p class="text-sm text-slate-500 mb-5">Minimal 12 karakter, huruf besar, kecil, dan angka.</p>

      <template x-if="done">
        <div class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
          Kata sandi berhasil diubah. <a href="/login" class="underline">Masuk sekarang</a>.
        </div>
      </template>

      <template x-if="error">
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm" x-text="error"></div>
      </template>

      <form x-show="!done" @submit.prevent="async () => {
        loading = true; error = '';
        const f = $el;
        const res = await fetch('/api/auth/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: f.token.value, new_password: f.new_password.value })
        });
        loading = false;
        if (res.ok) { done = true; } else { const d = await res.json(); error = d.detail || 'Token tidak valid.'; }
      }" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}">
        <div>
          <label class="block text-sm font-medium mb-1.5">Kata Sandi Baru</label>
          <input type="password" name="new_password" required minlength="12" class="input" autofocus>
        </div>
        <button type="submit" :disabled="loading" class="btn-primary w-full py-2.5">
          <span x-text="loading ? 'Menyimpan...' : 'Simpan Kata Sandi'"></span>
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
