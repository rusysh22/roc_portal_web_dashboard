services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: roc_portal_app
    expose:
      - "7788"
    ports:
      - "127.0.0.1:7788:7788"
    env_file:
      - .env
    volumes:
      - ./app/src:/code/src
      - ./app/alembic:/code/alembic
      - export_tmp:/code/tmp/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - roc_net

  tailwind:
    image: node:20-alpine
    container_name: roc_portal_tailwind
    working_dir: /build
    volumes:
      - ./app:/build
    command: sh -c "npm install --silent && npm run build:css"
    restart: "no"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: roc_portal_nginx
    ports:
      - "7780:80"
      - "7789:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - roc_net

  postgres:
    image: postgres:16-alpine
    container_name: roc_portal_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - roc_net

  redis:
    image: redis:7-alpine
    container_name: roc_portal_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - roc_net

volumes:
  pgdata:
  redis_data:
  export_tmp:

networks:
  roc_net:
    driver: bridge
